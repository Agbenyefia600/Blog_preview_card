<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  
  <title>Frontend Mentor | Blog preview card</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 0.6875rem; text-align: center;  }
    .attribution a { color: hsl(228, 45%, 44%); }
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #f4d03f;
      font-family: 'Manrope', sans-serif;
      padding: 2rem;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      overflow: hidden;
      width: 100%;
      max-width: 380px;
      box-shadow: 8px 8px 0px #111;
      border: 2px solid #111;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .card:hover {
      transform: translate(-3px, -3px);
      box-shadow: 11px 11px 0px #111;
    }

    /* ── Card Image ── */
    .card__image {
      width: 100%;
      height: 220px;
      overflow: hidden;
      background-color: #f4d03f;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card__image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Placeholder shown when no image src is provided */
    .card__image-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: #111;
      opacity: 0.5;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .card__image-placeholder svg {
      width: 40px;
      height: 40px;
    }

    /* ── Card Body ── */
    .card__body {
      padding: 1.5rem;
    }

    /* Tag */
    .card__tag {
      display: inline-block;
      background: #f4d03f;
      color: #111;
      font-size: 0.75rem;
      font-weight: 800;
      padding: 4px 12px;
      border-radius: 6px;
      margin-bottom: 0.85rem;
      letter-spacing: 0.03em;
    }

    /* Date */
    .card__date {
      font-size: 0.8rem;
      color: #666;
      margin-bottom: 0.5rem;
      font-weight: 500;
    }

    /* Title — turns yellow on hover */
    .card__title {
      font-size: 1.25rem;
      font-weight: 800;
      color: #111;
      line-height: 1.3;
      margin-bottom: 0.85rem;
      cursor: pointer;
      transition: color 0.2s ease;
      display: inline-block;
    }

    .card__title:hover {
      color: #c9a800;
    }

    /* Description */
    .card__desc {
      font-size: 0.875rem;
      color: #555;
      line-height: 1.65;
      margin-bottom: 1.25rem;
    }

    /* Author */
    .card__author {
      display: flex;
      align-items: center;
      gap: 0.65rem;
    }

    .card__avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #111;
      background: #ddd;
      flex-shrink: 0;
    }

    .card__author-name {
      font-size: 0.875rem;
      font-weight: 700;
      color: #111;
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      body {
        padding: 1.25rem;
        align-items: flex-start;
        padding-top: 3rem;
      }

      .card {
        max-width: 100%;
      }

      .card__image {
        height: 200px;
      }

      .card__title {
        font-size: 1.15rem;
      }
    }
    footer {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  padding: 10px;
}
  </style>
</head>
<body>
<div class="card">

    <!-- ✏️ CARD IMAGE: Replace src="" with your image path -->
    <div class="card__image">
      <img src="assets\images\illustration-article.svg" alt="Card image" id="cardImg"
           onerror="this.style.display='none'; document.getElementById('imgPlaceholder').style.display='flex';"
           onload="document.getElementById('imgPlaceholder').style.display='none';" />

      <!-- Placeholder shown when no image is provided -->
      <div class="card__image-placeholder" id="imgPlaceholder">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
        </svg>
        Insert image here
      </div>
    </div>

    <div class="card__body">
      <span class="card__tag">Learning</span>
      <p class="card__date">Published 21 Dec 2023</p>
      <h2 class="card__title">HTML &amp; CSS foundations</h2>
      <p class="card__desc">
        These languages are the backbone of every website, defining structure, content, and presentation.
      </p>
      <div class="card__author">
        <!-- ✏️ AUTHOR AVATAR: Replace src="" with the avatar image path -->
        <img class="card__avatar" src="assets\images\image-avatar.webp" alt="Greg Hooper"
             onerror="this.src='https://ui-avatars.com/api/?name=Greg+Hooper&background=f4d03f&color=111&bold=true'"/>
        <span class="card__author-name">Greg Hooper</span>
      </div>
    </div>

  </div>

  <script>
    // Auto-show placeholder if image src is empty
    window.addEventListener('DOMContentLoaded', () => {
      const img = document.getElementById('cardImg');
      const placeholder = document.getElementById('imgPlaceholder');
      if (!img.src || img.src === window.location.href) {
        img.style.display = 'none';
        placeholder.style.display = 'flex';
      }
    });
  </script>


  
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="https://github.com/Agbenyefia600">Godswill Agbenyefia Vittor</a>.
  </footer>
</body>
</html>
